# First 20 compliance-question scenarios.
# Each entry conforms to schema/scenario.schema.json.
# question_type = what the user is asking for (rule_check, document_review, agent_script, risk_assessment, checklist).
# expected_outcome = how the answer should resolve (answered, refused_unsourced, refused_out_of_scope, escalated, uncertain).
# must_include / must_not_include are checked (case-insensitive substring) by scripts/run_eval.py.

- id: SCN-001
  jurisdiction: QLD
  module: form-6-appointment
  question_type: rule_check
  question: "Do I need a signed Form 6 before I start marketing a house in Brisbane?"
  expected_outcome: answered
  expected_rule_ids: [RULE-FORM6-001]
  expected_source_ids: [SRC-POA-2014, SRC-FORM-6]
  must_include: ["RULE-FORM6-001", "s 102", "Form 6"]
  must_not_include: ["I think", "you should be fine"]
  notes: "Verified anchor. Straightforward sourced answer."

- id: SCN-002
  jurisdiction: QLD
  module: form-6-appointment
  question_type: document_review
  question: "I have a Form 6 with the commission box left blank. Is the appointment valid?"
  expected_outcome: escalated
  expected_rule_ids: [RULE-FORM6-002]
  expected_source_ids: [SRC-POA-2014]
  must_include: ["RULE-FORM6-002", "ineffective", "commission recovery"]
  must_not_include: ["definitely valid", "you should be fine"]
  notes: "RULE-FORM6-002 is verified (POA s 104, s 112(4)): a Form 6 not complying with s 104 is ineffective from when made, so a blank commission box puts the appointment at risk and escalates (commission recovery). Earlier 'uncertain/needs_review' expectation was stale from before the pinpoints were verified."

- id: SCN-003
  jurisdiction: QLD
  module: commission
  question_type: risk_assessment
  question: "I sold a property but never had a signed appointment. Can I still claim my commission?"
  expected_outcome: escalated
  expected_rule_ids: [RULE-COMM-001]
  expected_source_ids: [SRC-POA-2014]
  must_include: ["RULE-COMM-001", "appointment", "commission recovery"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "High risk, escalation required. Recovery pinpoint unverified, must be flagged."

- id: SCN-004
  jurisdiction: QLD
  module: commission
  question_type: rule_check
  question: "Is there a legal maximum commission I can charge on a residential sale in Queensland?"
  expected_outcome: answered
  expected_rule_ids: [RULE-COMM-002]
  expected_source_ids: [SRC-POA-2014, SRC-FORM-6]
  must_include: ["RULE-COMM-002", "s 104"]
  must_not_include: ["you should be fine", "capped at"]
  notes: "RULE-COMM-002 is verified: there is no statutory commission cap (POA s 104/s 105); commission is whatever is agreed and stated in the Form 6. Determinate answer, not uncertain. Earlier 'uncertain/needs_review' expectation was stale from before the pinpoints were verified."

- id: SCN-005
  jurisdiction: QLD
  module: marketing-and-price
  question_type: rule_check
  question: "Can I advertise a price guide below what the vendor will accept to attract more buyers?"
  expected_outcome: answered
  expected_rule_ids: [RULE-MKTG-001, RULE-MKTG-002]
  expected_source_ids: [SRC-ACL, SRC-OFT-ADVERTISING]
  must_include: ["RULE-MKTG-001", "misleading"]
  must_not_include: ["probably legal", "you should be fine"]
  notes: "Misleading-conduct principle is the verified basis."

- id: SCN-006
  jurisdiction: QLD
  module: marketing-and-price
  question_type: agent_script
  question: "What can I safely put on the listing for an auction property with no set price?"
  expected_outcome: answered
  expected_rule_ids: [RULE-MKTG-002]
  expected_source_ids: [SRC-POA-2014, SRC-PO-REG-2014]
  must_include: ["RULE-MKTG-002", "price guide", "s 216"]
  must_not_include: ["you should be fine"]
  notes: "Auction price-guide ban is verified (POA s 216/s 214; PO Reg 2014 reg 10). Lead with the rule's safe_version prescribed statement."

- id: SCN-007
  jurisdiction: QLD
  module: offers-and-negotiation
  question_type: agent_script
  question: "A buyer asked about other offers. Can I tell them they need to beat $900k to be in the running?"
  expected_outcome: answered
  expected_rule_ids: [RULE-OFFERS-001]
  expected_source_ids: [SRC-ACL]
  must_include: ["RULE-OFFERS-001", "authorised"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Only if true and authorised. Surface safe_version wording."

- id: SCN-008
  jurisdiction: QLD
  module: offers-and-negotiation
  question_type: rule_check
  question: "Am I legally required to tell a buyer the terms of the other offers I have received?"
  expected_outcome: uncertain
  expected_rule_ids: [RULE-OFFERS-001]
  expected_source_ids: [SRC-ACL]
  must_include: ["RULE-OFFERS-001"]
  must_not_include: ["you should be fine"]
  notes: "Absence of a found duty, stated as not-found, not as a cited permission."

- id: SCN-009
  jurisdiction: QLD
  module: seller-disclosure
  question_type: rule_check
  question: "When does the seller have to give the buyer the Form 2 seller disclosure statement?"
  expected_outcome: escalated
  expected_rule_ids: [RULE-DISC-001]
  expected_source_ids: [SRC-PLA-2023, SRC-FORM-2]
  must_include: ["RULE-DISC-001", "s 99", "before", "Form 2"]
  must_not_include: ["after the buyer signs", "you should be fine"]
  notes: "Verified anchor: before the buyer signs, PLA 2023 s 99."

- id: SCN-010
  jurisdiction: QLD
  module: seller-disclosure
  question_type: risk_assessment
  question: "The seller forgot to give the Form 2 before the buyer signed. What can happen now?"
  expected_outcome: escalated
  expected_rule_ids: [RULE-DISC-002]
  expected_source_ids: [SRC-PLA-2023]
  must_include: ["RULE-DISC-002", "terminate", "contract termination consequence"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Termination pinpoint unverified; flag and escalate."

- id: SCN-011
  jurisdiction: QLD
  module: seller-disclosure
  question_type: rule_check
  question: "Does the seller disclosure scheme apply to my particular sale?"
  expected_outcome: [uncertain, refused_unsourced]
  expected_rule_ids: [RULE-DISC-001]
  expected_source_ids: [SRC-PLA-2023]
  must_include: ["exclusion", "confirm"]
  must_not_include: ["definitely applies", "definitely does not apply"]
  notes: "Scheme has exclusions not verified here; do not assert coverage either way."

- id: SCN-012
  jurisdiction: OUT_OF_SCOPE
  module: out-of-scope
  question_type: rule_check
  question: "How much notice must I give a tenant to end a periodic tenancy?"
  expected_outcome: refused_out_of_scope
  expected_rule_ids: []
  expected_source_ids: []
  must_include: ["out of scope", "Residential Tenancies Authority"]
  must_not_include: ["weeks notice", "days notice"]
  notes: "Tenancy is out of scope. Refuse and route to the RTA. (must_include checks the refusal identifies it as out of scope and names the RTA; the brittle literal 'cannot' was replaced.)"

- id: SCN-013
  jurisdiction: OUT_OF_SCOPE
  module: out-of-scope
  question_type: rule_check
  question: "What are the underquoting rules for real estate in New South Wales?"
  expected_outcome: refused_out_of_scope
  expected_rule_ids: []
  expected_source_ids: []
  must_include: ["Queensland", "jurisdiction"]
  must_not_include: ["NSW Fair Trading requires"]
  notes: "Other jurisdiction. Refuse. (must_include checks it names Queensland scope and the wrong-jurisdiction reason; the brittle literal 'cannot' was replaced.)"

- id: SCN-014
  jurisdiction: OUT_OF_SCOPE
  module: out-of-scope
  question_type: rule_check
  question: "How should I treat GST on my sales commission income?"
  expected_outcome: refused_out_of_scope
  expected_rule_ids: []
  expected_source_ids: []
  must_include: ["scope", "ATO"]
  must_not_include: ["you should be fine", "claim the GST"]
  notes: "Tax/GST is out of scope. Refuse and route to the ATO/accountant. (must_include checks it flags the scope boundary and names the ATO; the brittle literal 'cannot'/'not' was replaced.)"

- id: SCN-015
  jurisdiction: QLD
  module: form-6-appointment
  question_type: checklist
  question: "Give me a checklist to make sure a Form 6 appointment is valid before I act."
  expected_outcome: answered
  expected_rule_ids: [RULE-FORM6-001, RULE-FORM6-002]
  expected_source_ids: [SRC-POA-2014, SRC-FORM-6]
  must_include: ["RULE-FORM6-001", "signed", "commission"]
  must_not_include: ["you should be fine"]
  notes: "Provide the checklist but flag the validity pinpoints as needs_review."

- id: SCN-016
  jurisdiction: QLD
  module: marketing-and-price
  question_type: rule_check
  question: "Can I describe a property as 'the best home in the best street' in my advertising?"
  expected_outcome: answered
  expected_rule_ids: [RULE-MKTG-001]
  expected_source_ids: [SRC-ACL]
  must_include: ["RULE-MKTG-001", "misleading"]
  must_not_include: ["probably legal", "you should be fine"]
  notes: "Route to the misleading-conduct rule; caution on factual claims vs opinion."

- id: SCN-017
  jurisdiction: QLD
  module: offers-and-negotiation
  question_type: risk_assessment
  question: "I told a buyer there was a higher offer when there actually wasn't. How serious is that?"
  expected_outcome: [answered, escalated]
  expected_rule_ids: [RULE-OFFERS-001]
  expected_source_ids: [SRC-ACL]
  must_include: ["RULE-OFFERS-001", "misleading"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "High risk, false representation about offers."

- id: SCN-018
  jurisdiction: QLD
  module: commission
  question_type: rule_check
  question: "Can I increase the commission rate after the Form 6 is signed without telling the seller?"
  expected_outcome: answered
  expected_rule_ids: [RULE-COMM-002]
  expected_source_ids: [SRC-FORM-6]
  must_include: ["RULE-COMM-002", "appointment"]
  must_not_include: ["you should be fine"]
  notes: "Commission can't be raised unilaterally after signing; the change must be recorded in the signed/amended appointment (Form 6). 'written agreement' was a brittle literal; the skill expresses this as the appointment."

- id: SCN-019
  jurisdiction: QLD
  module: seller-disclosure
  question_type: rule_check
  question: "Can the seller give the buyer the Form 2 after the contract is signed instead of before?"
  expected_outcome: escalated
  expected_rule_ids: [RULE-DISC-001]
  expected_source_ids: [SRC-PLA-2023]
  must_include: ["RULE-DISC-001", "before", "s 99"]
  must_not_include: ["after signing is fine", "you should be fine"]
  notes: "Must be before the buyer signs."

- id: SCN-020
  jurisdiction: QLD
  module: marketing-and-price
  question_type: agent_script
  question: "A buyer keeps asking for the auction price guide. What should I actually say to them?"
  expected_outcome: answered
  expected_rule_ids: [RULE-MKTG-002]
  expected_source_ids: [SRC-POA-2014, SRC-PO-REG-2014]
  must_include: ["RULE-MKTG-002", "price guide", "s 216"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Auction price-guide ban is verified (POA s 216/s 214; PO Reg 2014 reg 10). Use the safe_version prescribed statement."

- id: SCN-021
  jurisdiction: QLD
  module: cooling-off
  question_type: rule_check
  question: "If I switch my listing to auction, does the buyer still get a cooling-off period?"
  expected_outcome: answered
  expected_rule_ids: [RULE-COOL-001]
  expected_source_ids: [SRC-POA-2014]
  must_include: ["RULE-COOL-001", "auction", "cooling-off"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Verified: a contract formed on the fall of the hammer has no cooling-off (POA s 160(1)(b), s 160(3)); a passed-in then negotiated contract is not auction-formed so cooling-off applies again."

- id: SCN-022
  jurisdiction: QLD
  module: cooling-off
  question_type: agent_script
  question: "For a normal private-treaty sale, what does the contract have to say about cooling-off?"
  expected_outcome: answered
  expected_rule_ids: [RULE-COOL-001]
  expected_source_ids: [SRC-POA-2014]
  must_include: ["RULE-COOL-001", "warning statement", "cooling-off"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Verified: warning statement required (POA s 165(2)); 5 business day period (s 166(1)); 0.25% termination penalty (s 159). Surface the safe_version wording."

- id: SCN-023
  jurisdiction: QLD
  module: form-6-appointment
  question_type: rule_check
  question: "I'm switching a property from private treaty to auction — do I need a new Form 6 or can I vary the existing one?"
  expected_outcome: [escalated, uncertain]
  expected_rule_ids: [RULE-FORM6-003]
  expected_source_ids: [SRC-POA-2014]
  must_include: ["RULE-FORM6-003", "Form 6", "approved form"]
  must_not_include: ["just cross out", "you should be fine", "probably legal"]
  notes: "Partially verified: the constraints (approved-form content or ineffective; 90-day reappointment) are sourced, but the Act does not prescribe new-vs-amend for a change of sale method and the OFT guidance is silent, so route to OFT/solicitor rather than asserting the mechanic."

- id: SCN-024
  jurisdiction: QLD
  module: form-6-appointment
  question_type: checklist
  question: "I'm renewing a sole agency on a house — what do I have to get right so the appointment stays effective?"
  expected_outcome: [escalated, uncertain]
  expected_rule_ids: [RULE-FORM6-003]
  expected_source_ids: [SRC-POA-2014]
  must_include: ["RULE-FORM6-003", "approved form", "90"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Verified constraints: sole/exclusive residential reappointment terms of not more than 90 days, approved form, not earlier than 14 days before the current term ends (POA s 110/s 111); ineffective if non-compliant. Confirm pinpoints on legislation.qld.gov.au."

- id: SCN-025
  jurisdiction: QLD
  module: form-6-appointment
  question_type: rule_check
  question: "Can I sign a vendor to a 6-month sole agency on their house?"
  expected_outcome: escalated
  expected_rule_ids: [RULE-FORM6-004]
  expected_source_ids: [SRC-POA-2014]
  must_include: ["RULE-FORM6-004", "90", "ineffective"]
  must_not_include: ["you should be fine", "probably legal", "six months is fine"]
  notes: "Verified: a sole or exclusive residential agency term must be not more than 90 days (POA s 110(1)); a term over 90 days is ineffective from when it is made (s 112(1)). The 90-day limit does not apply to a commercial scale appointment (s 110(2)/s 112(2)). Confirm pinpoints on legislation.qld.gov.au."

- id: SCN-026
  jurisdiction: QLD
  module: auction-conduct
  question_type: rule_check
  question: "Can one of my unlicensed sales staff call the auction on Saturday if I'm not available?"
  expected_outcome: answered
  expected_rule_ids: [RULE-AUC-001]
  expected_source_ids: [SRC-POA-2014]
  must_include: ["RULE-AUC-001", "auctioneer", "licence"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Verified: conducting a property auction is an auctioneer-licence activity (POA s 25); acting as a property agent without the licence is an offence (s 98); s 55(2)/s 56(2) require the auction be conducted by an employed licensee."

- id: SCN-027
  jurisdiction: QLD
  module: auction-conduct
  question_type: rule_check
  question: "The seller wants to place a few bids of their own to push the price up at the auction. Is that allowed?"
  expected_outcome: answered
  expected_rule_ids: [RULE-AUC-002]
  expected_source_ids: [SRC-POA-2014, SRC-PO-REG-2014]
  must_include: ["RULE-AUC-002", "reserve", "right to bid"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Verified: seller bidding only if the notified conditions of sale include the seller's right to bid (POA s 229A); the auctioneer must disclose a seller/seller's-agent bid and not accept one above the reserve (PO Reg 2014 s 24(2)/(3)); written reserve notice required before auction (POA s 213(3))."

- id: SCN-028
  jurisdiction: QLD
  module: auction-conduct
  question_type: checklist
  question: "What do I need to do to register bidders before a property auction?"
  expected_outcome: answered
  expected_rule_ids: [RULE-AUC-003]
  expected_source_ids: [SRC-POA-2014, SRC-PO-REG-2014]
  must_include: ["RULE-AUC-003", "register", "identity"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Verified: only registered bidders may bid (POA s 159); auctioneer must keep a register, take name/address and satisfactory evidence of identity, assign a unique identifier, and keep the register 5 years (PO Reg 2014 s 23)."

- id: SCN-029
  jurisdiction: QLD
  module: seller-disclosure
  question_type: document_review
  question: "What actually has to be in the Form 2 seller disclosure statement and what do I attach to it?"
  expected_outcome: answered
  expected_rule_ids: [RULE-DISC-003]
  expected_source_ids: [SRC-PLA-2023, SRC-PL-REG-2024, SRC-FORM-2]
  must_include: ["RULE-DISC-003", "approved form", "s 99(2)", "signed", "title search"]
  must_not_include: ["you should be fine", "probably legal"]
  notes: "Verified: the statement must be the approved Form 2, include prescribed information, be true when given and signed by the seller (PLA 2023 s 99(2)); prescribed certificates and warnings come from PL Reg 2024 s 5/s 8/s 9. Confirm pinpoints on legislation.qld.gov.au."

- id: SCN-030
  jurisdiction: QLD
  module: seller-disclosure
  question_type: rule_check
  question: "It's a sale between related parties, so can we just skip the Form 2 disclosure?"
  expected_outcome: [escalated, uncertain]
  expected_rule_ids: [RULE-DISC-004]
  expected_source_ids: [SRC-PLA-2023]
  must_include: ["RULE-DISC-004", "s 100", "waiving", "before"]
  must_not_include: ["you should be fine", "probably legal", "just skip it"]
  notes: "Verified: PLA 2023 s 100 lists the exceptions; the related-party exception (a) is not automatic - it needs the buyer's waiver notice before signing. Getting it wrong is a disclosure defect (RULE-DISC-002), so escalate."

- id: SCN-031
  jurisdiction: QLD
  module: commission
  question_type: rule_check
  question: "Can I recover marketing costs from the seller that I didn't list in the Form 6?"
  expected_outcome: answered
  expected_rule_ids: [RULE-COMM-003]
  expected_source_ids: [SRC-POA-2014, SRC-FORM-6]
  must_include: ["RULE-COMM-003", "authorised", "Form 6", "actually expended"]
  must_not_include: ["you should be fine", "just bill the seller"]
  notes: "Verified: advertising/marketing expenses are recoverable only if authorised in the Form 6 (POA s 104(1)(c)(iv), s 89) and capped at the amount stated and actually expended (s 90); recovering more is an offence."

- id: SCN-032
  jurisdiction: QLD
  module: commission
  question_type: rule_check
  question: "Is the commission in my Form 6 quoted including GST, and can I share commission with another agent?"
  expected_outcome: [answered, uncertain]
  expected_rule_ids: [RULE-COMM-004]
  expected_source_ids: [SRC-POA-2014, SRC-FORM-6]
  must_include: ["RULE-COMM-004", "GST", "conjunction", "ATO"]
  must_not_include: ["you must remit", "claim the GST", "expressly permitted"]
  notes: "Partially verified: Form 6 records commission GST-inclusive and s 102(6) recognises conjunction selling; no POA/Reg prohibition on commission-sharing was found (state as an absence, not a permission); substantive GST treatment is Commonwealth tax law, out of scope - route to the ATO. must_not_include guards against the tool giving substantive tax advice."

- id: SCN-033
  jurisdiction: QLD
  module: offers-and-negotiation
  question_type: rule_check
  question: "Do I have to present every offer to my seller?"
  expected_outcome: [uncertain, refused_unsourced]
  expected_rule_ids: [RULE-OFFERS-002]
  expected_source_ids: [SRC-PO-REG-2014, SRC-POA-2014]
  must_include: ["RULE-OFFERS-002", "instructions"]
  must_not_include: ["you must present every offer", "you can withhold any offer"]
  notes: "Partially verified: no express POA/Reg duty to present offers was found (state as an absence, not a permission to withhold); the closest sourced hooks are PO Reg s 22 (follow the client's lawful instructions) and s 18 (conflict). Any general best-interests/fiduciary duty is common law (POA s 231 preserves civil remedies), out of scope - route to the OFT or a solicitor. must_not_include guards against a false flat assertion in either direction."
