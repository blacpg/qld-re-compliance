# MVP module index for Queensland property sales (v1).
# A question is first classified by question_type (what the user is asking for),
# then routed to a module. The way the answer resolves is recorded separately as
# answer_outcome.

# question_type = the user's task type.
question_types:
  - id: rule_check
    description: "Is X allowed / required? Direct compliance question."
  - id: document_review
    description: "Review this completed document (e.g. a Form 6) for compliance gaps."
  - id: agent_script
    description: "What can I safely say to a buyer/seller? Produces safe wording."
  - id: risk_assessment
    description: "How serious is this situation and what is the exposure?"
  - id: checklist
    description: "Give me the steps / required items for X."

# answer_outcome = how an answer resolves, AFTER routing and source-checking.
# Any question_type can end in any of these (a document_review can be answered,
# uncertain, escalated, or refused).
answer_outcomes:
  - id: answered
    description: "A sourced answer was given from a matching, sufficiently verified rule."
  - id: refused_unsourced
    description: "No cited rule covered the question; refused rather than guessing."
  - id: refused_out_of_scope
    description: "Topic outside QLD property sales (tenancy, other state, tax); refused and routed."
  - id: escalated
    description: "Answered but flagged for human escalation (e.g. commission recovery, termination)."
  - id: uncertain
    description: "Matching rule exists but is unverified / needs_review; flagged as not settled."

modules:
  - id: form-6-appointment
    title: "Form 6 appointment to act"
    covers:
      - Valid appointment before performing services
      - Mandatory contents and signatures
      - Commission disclosure on the form
      - Sole vs open appointment and term limits
      - Reappointment and withdrawal
  - id: commission
    title: "Commission"
    covers:
      - How commission may be expressed and agreed
      - Written agreement and disclosure
      - Sharing and referral
      - No recovery without a valid appointment
  - id: marketing-and-price
    title: "Marketing and price representations"
    covers:
      - Auction and no-price marketing
      - Price guides and "offers over"
      - Misleading or deceptive price conduct (POA + ACCC)
  - id: offers-and-negotiation
    title: "Offers and negotiation"
    covers:
      - Handling multiple offers
      - No duty to disclose other offers' terms
      - No dummy or fictitious offers
      - Misleading conduct in negotiation
  - id: seller-disclosure
    title: "Seller disclosure"
    covers:
      - Property Law Act 2023 seller disclosure scheme
      - Form 2 Seller Disclosure Statement contents
      - When disclosure must be given
      - Form 8 buyer angle
      - Consequences of non-disclosure / termination rights
  - id: cooling-off
    title: "Cooling-off period"
    covers:
      - 5 business day cooling-off period for residential relevant contracts
      - The required cooling-off warning statement in the proposed contract
      - 0.25% termination penalty and termination during the period
      - Waiving or shortening the cooling-off period
      - Auction exclusion (no cooling-off on a contract formed at auction) and passed-in / negotiated contracts
