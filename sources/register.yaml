    licence: "© Realworks / REIQ. Cited and linked, not reproduced."
    pinpoint_style: "help article section"
    notes: "Software-workflow help, NOT a source of law. Records that in Realworks finalising a form removes the 'DRAFT' watermark and locks it from editing, and that finalising precedes sending for signatures; a not-finalised form can be reverted to Draft only while unsigned, and a signed form must be voided and duplicated to edit. Used only to explain the practical meaning of a 'draft' watermark. Supporting citation only."
