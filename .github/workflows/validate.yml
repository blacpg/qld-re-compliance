name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate sources
        run: python3 scripts/validate_sources.py

      - name: Validate rules
        run: python3 scripts/validate_rules.py

      - name: Validate scenarios
        run: python3 scripts/validate_scenarios.py

      - name: Citation coverage
        run: python3 scripts/citation_coverage.py

      - name: Stale-source check (warn only)
        run: python3 scripts/check_stale_sources.py --warn-only

      # Note: scripts/run_eval.py (behavioural eval) is NOT run in CI.
      # It requires an Anthropic API key and is run on demand by a maintainer.
