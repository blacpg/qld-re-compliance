agent_action:
  - "For an auction property, do not disclose a price guide; you can use the prescribed statement that a price guide cannot be provided."
  - "For an 'offers over' or genuine no-price listing, set any figure at the minimum the vendor will genuinely accept and keep it honest."

agent_wording:
  safe_version: "This property is being sold by auction or without a price and therefore a price guide can not be provided."
  avoid_saying:
    - "Disclosing a price guide for a property that is to be, may be, or is being offered for sale by auction."
    - "Quoting an 'offers over' figure below what the vendor will genuinely accept."

exceptions:
  - "Limited exception: the price may be given to an electronic listings provider that will not publish it, where the listing carries the prescribed statement (POA s 216 / s 214; PO Reg 2014 reg 10)."

penalty: null

