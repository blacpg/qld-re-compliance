id: RULE-MKTG-002
title: Auction and "no price / offers over" marketing
jurisdiction: QLD
module: marketing-and-price
question_types:
  - rule_check
  - agent_script

status: active
verification_status: needs_review
verification_note: >-
  Verified from OFT guidance (2026-06-20): where an "offers over" price is used,
  it should be the minimum amount the vendor is willing to accept, and price
  conduct is governed by the Australian Consumer Law. NOT verified: the claim,
  seen in secondary commentary, that an agent is prohibited from giving ANY price
  guide once a property is going to auction. The OFT property-advertising page
  did not state a blanket no-price-guide-at-auction rule. Do not present that as
  settled law until confirmed.
risk_level: medium
authority_tier: regulator_guidance

applies_when:
  - Marketing a property for auction, or without a fixed price, or as "offers over".

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.

requirement: >-
  If you advertise "offers over" a figure, that figure should be the minimum the
  vendor is genuinely willing to accept. Any price signal you give, including for
  an auction property, must not be misleading under the Australian Consumer Law.

detail: >-
  The verified guidance is about honesty of the price signal, not a blanket ban.
  The proposition that no price guide may be given for an auction property is
  unverified and is flagged for checking. Until confirmed, rely on the
  misleading-conduct principle in RULE-MKTG-001.

sources:
  - source_id: SRC-OFT-ADVERTISING
    pinpoint: "offers-over guidance"
    source_role: primary
    url: "https://www.qld.gov.au/law/laws-regulated-industries-and-accountability/queensland-laws-and-regulations/regulated-industries-and-licensing/regulated-industries-licensing-and-legislation/property-industry-regulation/best-practice-for-the-property-industry/property-advertising"
    quote: null
  - source_id: SRC-ACL
    pinpoint: "s 18 (pinpoint unverified in-session)"
    source_role: supporting
    url: "https://www.legislation.gov.au/C2004A00109/latest/text"
    quote: null

agent_action:
  - "If you use 'offers over', set it at the minimum the vendor will genuinely accept."
  - "For an auction property, do not give a price signal you cannot stand behind; check current OFT advice before quoting a guide."

agent_wording:
  safe_version: "This property is going to auction. I'm not able to give you a figure the vendor has not authorised."
  avoid_saying:
    - "Quoting an 'offers over' figure below what the vendor will actually accept."
    - "Asserting a precise auction price guide as if it were authorised and accurate when it is not."

exceptions: []
penalty: null

human_escalation_required: false
escalation_reason: []

related_rules:
  - RULE-MKTG-001

last_source_check: 2026-06-20
next_review_due: 2026-09-18
tags:
  - marketing
  - auction
  - price-guide
