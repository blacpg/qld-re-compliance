id: RULE-MKTG-002
title: No price guide for auction properties; honest pricing for no-price listings
jurisdiction: QLD
module: marketing-and-price
question_types:
  - rule_check
  - agent_script

status: active
verification_status: verified
verification_note: null
risk_level: high
authority_tier: legislation

applies_when:
  - Marketing a property for auction, or without a fixed price, or as "offers over".

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.

requirement: >-
  For a property that is to be, may be, or is being offered for sale by auction,
  the agent must not disclose a price guide for the property (Property Occupations
  Act 2014 s 216; the auctioneer equivalent is s 214). For a genuine no-price
  non-auction listing or an "offers over" figure, pricing must be honest and not
  misleading, and an "offers over" figure should be the minimum the vendor will
  genuinely accept.

detail: >-
  Under the Property Occupations Act 2014 a real estate agent must not disclose a
  price guide for a property that is to be, may be, or is being offered for sale
  by auction (s 216(2)(c)); the same prohibition applies to the auctioneer
  (s 214(2)(c)). A limited exception allows giving the price to an electronic
  listings provider that will not publish it, where the listing carries the
  prescribed statement. The Property Occupations Regulation 2014 reg 10 prescribes
  that statement: "This property is being sold by auction or without a price and
  therefore a price guide can not be provided." For genuine no-price non-auction
  listings there is no blanket ban; pricing must simply be honest and not
  misleading or a false representation (see RULE-MKTG-001).

sources:
