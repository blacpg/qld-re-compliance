id: RULE-MKTG-001
title: Do not make false or misleading representations about a property or its price
jurisdiction: QLD
module: marketing-and-price
question_types:
  - rule_check
  - agent_script
  - risk_assessment

status: active
verification_status: partially_verified
verification_note: >-
  POA limb verified at s 212; ACL s 18/s 30 limb still pending (Task 5); remains
  partially_verified until ACL confirmed.
risk_level: high
authority_tier: legislation

applies_when:
  - Advertising or describing a property, its features, or its price.
  - An agent asks whether a marketing claim or price statement is allowed.

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.

requirement: >-
  Do not state or imply anything false or misleading about a property or its
  price. This applies to advertised prices, price guides, features, and any claim
  likely to influence a buyer.

detail: >-
  Two layers apply. Queensland's Property Occupations Act 2014 prohibits false or
  misleading representations relating to the letting, exchange or sale of real
  property (s 212). The Australian Consumer Law separately prohibits misleading or
  deceptive conduct and false or misleading representations about the sale of
  land. A statement can breach one or both.

sources:
  - source_id: SRC-POA-2014
    pinpoint: "s 212 \"False representations about property\""
    source_role: primary
    url: "https://www.legislation.qld.gov.au/view/html/inforce/current/act-2014-022"
    quote: "false or misleading relating to the letting, exchange or sale of real property"
  - source_id: SRC-ACL
    pinpoint: "s 18; s 30 (pinpoints unverified in-session)"
    source_role: primary
    url: "https://www.legislation.gov.au/C2004A00109/latest/text"
    quote: null
  - source_id: SRC-ACCC-RE
    pinpoint: "false or misleading representations about price"
    source_role: supporting
    url: "https://www.accc.gov.au/business/advertising-and-promotions/false-or-misleading-claims"
    quote: null

agent_action:
  - "Make sure every price and feature claim is accurate and able to be substantiated."
  - "If you are unsure whether a claim could mislead, do not make it."

agent_wording:
  safe_version: "This property is listed at [accurate listing detail]."
  avoid_saying:
    - "Stating or implying a price the vendor would not actually accept."
    - "Inventing features, comparable sales, or interest levels to influence a buyer."

exceptions: []
penalty: null

human_escalation_required: false
escalation_reason: []

related_rules:
  - RULE-MKTG-002
  - RULE-OFFERS-001

last_source_check: 2026-06-20
next_review_due: 2026-09-18
tags:
  - marketing
  - price
  - misleading-conduct
