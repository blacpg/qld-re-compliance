agent_action:
  - "For a private-treaty residential sale, make sure the proposed contract carries the conspicuous warning statement (5 business day cooling-off; 0.25% termination penalty) before the buyer signs."
  - "Tell a private-treaty buyer the 5 business day cooling-off period starts on the day they receive a copy of the contract signed by both parties from the seller."
  - "If you switch the listing to auction, explain that a contract formed on the fall of the hammer has no cooling-off period; do not promise an auction buyer a cooling-off period."
  - "If a property is passed in at auction and you later negotiate a contract, treat it as a relevant contract: cooling-off applies again unless a registered-bidder contract is entered by 5pm on the second clear business day after the property was passed in."

agent_wording:
  safe_version: "This contract may be subject to a statutory cooling-off period of 5 business days, and a termination penalty of 0.25% of the purchase price applies if you terminate the contract during that period."
  avoid_saying:
    - "Telling an auction buyer (a contract formed on the fall of the hammer) that they will get a cooling-off period."
    - "Leaving the cooling-off warning statement out of a private-treaty residential contract."
    - "you should be fine"

exceptions:
  - "Part 7 does not apply to a contract formed on a sale by auction (POA s 160(1)(b)(i), s 160(3))."
  - "Part 7 does not apply to a contract entered into by no later than 5pm on the second clear business day after the property was passed in at auction, with a registered bidder for the auction (POA s 160(1)(b)(ii))."
  - "The buyer may waive the cooling-off period (written notice before entering) or shorten it (written notice) (POA s 167)."

