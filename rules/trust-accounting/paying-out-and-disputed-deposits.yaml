id: RULE-TRUST-002
title: Paying trust money out, and handling a disputed deposit
jurisdiction: QLD
module: trust-accounting
question_types:
  - rule_check
  - risk_assessment
  - checklist

status: active
verification_status: verified
verification_note: null
risk_level: high
authority_tier: legislation

applies_when:
  - An agent asks when, or to whom, trust money may be paid out.
  - A transaction is finalised and the agent wants to draw the deposit, the agent's fee, or transaction expenses.
  - The buyer and seller (or any parties) are in dispute over who is entitled to a deposit.
  - An agent asks whether they can release a deposit that is being fought over.

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.

requirement: >-
  An amount paid to a trust account must be kept in the account until it is paid
  out under the Act, and may be paid out only in a way permitted under the Act
  (Agents Financial Administration Act 2014 (Qld) s 21; max 200 penalty units or 2
  years imprisonment). After a transaction is finalised the agent is authorised to
  draw to pay the person entitled (or someone else per that person's written
  direction), and to draw the agent's own transaction fee; transaction expenses may
  be drawn as they become payable (s 22). A DISPUTED amount must NOT be paid out
  unless the agent receives written notice from all parties to the transaction
  stating who is entitled to it, or a proceeding has been started (s 27; max 200
  penalty units or 2 years imprisonment). The agent may give all parties written
  notice that it will pay a stated party on or after a stated date at least 60 days
  after the notice, unless a proceeding is started or all parties authorise an
  earlier payment (s 26). Once entitlement is established under s 27 the agent must
  pay that person immediately; if a proceeding is started the agent must pay the
  amount to the court in which the proceeding was started (s 28).

detail: >-
  Under the Agents Financial Administration Act 2014 (Qld), s 21 ("When payments
  may be made from trust accounts") provides that an amount paid to a trust account
  must be kept in the account until it is paid out under the Act, and may be paid
  out only in a way permitted under the Act. The maximum penalty is 200 penalty
  units or 2 years imprisonment.

  Section 22 ("Permitted drawings from trust accounts") sets out the authorised
  drawings: after the transaction is finalised the agent is authorised to draw to
  pay the person entitled to the amount (or someone else per that person's written
  direction), and to draw the agent's own transaction fee; transaction expenses may
  be drawn as they become payable.

  Where an amount is in dispute, the Act is strict. Section 26 ("When amount in
  dispute may be paid") lets the agent give all parties written notice that it will
  pay a stated party on or after a stated date - which must be at least 60 days
  after the notice - unless a proceeding is started or all parties authorise an
  earlier payment. Section 27 ("Dealing with amount in dispute") provides that the
  agent must NOT pay out the amount in dispute unless it receives written notice
  from all parties to the transaction stating who is entitled to it, or a proceeding
  has been started (max 200 penalty units or 2 years imprisonment). Section 28
  provides that once the entitled person is established under s 27 the agent must
  pay them immediately, and if a proceeding is started the agent must pay the amount
  to the court in which the proceeding was started.

