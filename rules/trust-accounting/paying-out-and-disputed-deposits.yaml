agent_action:
  - "Keep trust money in the trust account until it is paid out as the Act permits (s 21); only draw it in a permitted way."
  - "After the transaction is finalised, draw to pay the person entitled (or per their written direction), draw your transaction fee, and draw transaction expenses as they become payable (s 22)."
  - "If parties are in dispute over a deposit, do NOT release it: you may only pay out once you have written notice from all parties stating who is entitled, or a proceeding has been started (s 27)."
  - "You may give all parties written notice of an intended payment to a stated party on or after a date at least 60 days away, unless a proceeding is started or all parties authorise an earlier payment (s 26)."
  - "Once entitlement is established under s 27, pay immediately; if a proceeding is started, pay the amount into the court in which the proceeding was started (s 28)."
  - "Before relying on the specific section numbers, confirm them on legislation.qld.gov.au."

agent_wording:
  safe_version: null
  avoid_saying:
    - "Telling either party you will just release the disputed deposit to them now - s 27 forbids paying out a disputed amount without written notice from all parties or a started proceeding."
    - "Suggesting you can decide who is right and pay them - entitlement must be established under s 27, or paid into court under s 28."
    - "you should be fine"

exceptions:
  - "A disputed amount may be paid out where the agent receives written notice from all parties stating who is entitled to it, or a proceeding has been started (s 27)."
  - "Under s 26 the agent may pay a stated party on or after a stated date at least 60 days after notice, unless a proceeding is started or all parties authorise an earlier payment."

penalty: "Maximum 200 penalty units or 2 years imprisonment (AFAA s 21 and s 27)."

