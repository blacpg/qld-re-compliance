agent_action:
  - "Bank a deposit (and any other trust money) you receive into the agency's general trust account before the end of the first business day after you receive it (or invest it under s 17)."
  - "Treat a buyer's deposit and purchase monies as an 'amount' caught by s 16 - s 89 says so."
  - "Do not pay anything into the trust account other than amounts required to be paid in under s 16 or s 17 (s 18)."
  - "Never use trust money for the agency's own purposes or to pay the agency's creditors - it is not available to them (s 20)."
  - "Before relying on the specific section numbers, confirm them on legislation.qld.gov.au."

agent_wording:
  safe_version: null
  avoid_saying:
    - "Telling someone a deposit can sit in a general operating account or be held personally - it must go to the general trust account before the end of the first business day after receipt."
    - "Suggesting trust money can be used to cover the agency's bills or be reached by a creditor - s 20 prohibits this."
    - "you should be fine"

exceptions:
  - "A refund of an authorised, receipted agent expense is excluded from 'amount' under s 89."
  - "Instead of paying to the general trust account, the agent may invest the amount under s 17."

penalty: "Maximum 200 penalty units or 2 years imprisonment (AFAA s 16)."

