    source_role: supporting
    url: "https://www.legislation.qld.gov.au/view/html/inforce/current/sl-2024-0211"
    quote: null

agent_action:
  - "Make sure the seller gives the buyer the completed Form 2 and the prescribed certificates BEFORE the buyer signs."
  - "Confirm which prescribed documents are required from the Property Law Regulation 2024."

agent_wording:
  safe_version: null
  avoid_saying: []

exceptions:
  - "The scheme has exclusions and specific cases; confirm whether the sale is covered before assuming disclosure is or is not required."

penalty: null

