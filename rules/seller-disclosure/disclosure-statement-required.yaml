id: RULE-DISC-001
title: Seller must give the buyer a Form 2 disclosure statement before the buyer signs
jurisdiction: QLD
module: seller-disclosure
question_types:
  - rule_check
  - checklist

status: active
verification_status: verified
verification_note: null
risk_level: high
authority_tier: legislation

applies_when:
  - A lot (property) is being sold and a contract is being prepared.
  - An agent asks what the seller must disclose before signing.

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.
  - The transaction is within an exclusion to the scheme (confirm against the Act and Regulation).

requirement: >-
  Before the buyer signs the contract, the seller must give the buyer a
  disclosure statement (the approved Form 2) and each document prescribed by
  regulation. Get the disclosure done before signing, not after.

detail: >-
  The Property Law Act 2023 (Qld), Part 7 Division 4 "Seller disclosure for sales
  of lots", section 99 ("Seller must give buyer disclosure documents") requires
  that, before a contract for the sale of a lot is signed by the buyer, the seller
  give the buyer a disclosure statement and each document prescribed by
  regulation. The statement must be in the approved form (s 99(2)), which is the
  Form 2. The scheme commenced on 1 August 2025.

sources:
