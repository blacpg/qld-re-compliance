id: RULE-DISC-002
title: Non-disclosure can give the buyer a right to terminate before settlement
jurisdiction: QLD
module: seller-disclosure
question_types:
  - rule_check
  - risk_assessment

status: active
verification_status: verified
verification_note: null
risk_level: high
authority_tier: legislation

applies_when:
  - The seller did not give the Form 2, or gave one that was wrong or incomplete.
  - Assessing the consequence of a disclosure failure.

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.

requirement: >-
  Under PLA 2023 s 104 the buyer may terminate the contract before settlement
  where the seller did not give a compliant disclosure statement before the buyer
  signed, or where the disclosure was inaccurate or incomplete and the statutory
  compound test is met. This is a serious consequence; get advice.

detail: |-
  Section 104 ("Buyer may terminate contract if seller fails to disclose or makes inaccurate disclosure") gives the buyer a right to terminate. The right is triggered if either of the following applies:
  - the seller fails to give the disclosure documents before the buyer signs the contract; or
  - the disclosure is inaccurate or incomplete AND all of these are satisfied: the matter is material; the buyer was not aware of the correct state of affairs at signing; and the buyer would not have signed the contract had they known.
  The termination notice must be given before settlement.

sources:
  - source_id: SRC-PLA-2023
    pinpoint: "s 104 \"Buyer may terminate contract if seller fails to disclose or makes inaccurate disclosure\" (Pt 7 div 4)"
    source_role: primary
    url: "https://www.legislation.qld.gov.au/view/html/inforce/current/act-2023-027"
    quote: "The buyer ... may terminate the contract ... The termination notice may be given at any time before settlement"

agent_action:
  - "Treat a missing or defective Form 2 as a serious risk to the contract."
  - "Refer the seller to a solicitor before settlement if disclosure may be defective."

agent_wording:
  safe_version: null
  avoid_saying: []

exceptions:
  - "The s 104 termination right does not apply where the same disclosure failure is also a failure under another Act that gives the buyer a remedy (s 104(4))."
penalty: null

human_escalation_required: true
escalation_reason:
  - contract termination consequence
  - seller disclosure defect

related_rules:
