id: RULE-DISC-003
title: What the seller disclosure statement (Form 2) must contain
jurisdiction: QLD
module: seller-disclosure
question_types:
  - rule_check
  - document_review
  - checklist

status: active
verification_status: verified
verification_note: null
risk_level: high
authority_tier: legislation

applies_when:
  - Preparing or checking the contents of a Form 2 seller disclosure statement.
  - An agent asks what must be in the disclosure statement or what documents must go with it.

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.
  - The question is only about WHEN the statement must be given (that is RULE-DISC-001).
  - The question is about the consequences of missing or defective disclosure (that is RULE-DISC-002).

requirement: >-
  The disclosure statement must be in the approved Form 2, include the
  information prescribed by regulation, be completed with information that is
  true when given to the buyer, and be signed by the seller (or an authorised
  agent). It must be accompanied by the prescribed certificates and carry the
  prescribed warnings.

detail: |-
  Property Law Act 2023 (Qld) s 99(2) requires the disclosure statement to: (a) be in the approved form; (b) include the information prescribed by regulation; (c) be completed with information that is true at the time it is given to the buyer; and (d) be signed by the seller. Section 99(3) requires the approved form to contain the warnings and other statements prescribed by regulation. Under s 97 the seller may sign personally or by an agent authorised to act for the seller.

  The Property Law Regulation 2024 fills in the detail:
  - s 5 ("Prescribed certificates for disclosure statement for sale of lot") prescribes the documents that must accompany the statement. The main categories are: a title search; a copy of the registered plan of survey; specified building, planning and QBCC notices; competent-authority notices; Environmental Protection Act notices; for a property with a regulated pool, a pool compliance certificate (or the prescribed no-certificate notice); for a community titles scheme, the community management statement and a body corporate certificate; and for a BUGTA scheme, a body corporate certificate.
  - s 8 ("Prescribed information for disclosure statement") prescribes the information the statement must include, such as the seller's name and the lot details.
  - s 9 prescribes the warnings and other statements in schedule 1 for the approved form.

