agent_action:
  - "Use the current approved Form 2; do not draft a substitute document."
  - "Attach every prescribed certificate (title search, registered plan, relevant notices, pool/CMS/body corporate documents as applicable) under PL Reg 2024 s 5."
  - "Make sure the statement is complete, true at the time it is given, carries the prescribed warnings, and is signed by the seller or an authorised agent."

