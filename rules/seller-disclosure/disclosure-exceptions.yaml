agent_action:
  - "Do not assume a sale is exempt; check it against the specific list in PLA 2023 s 100."
  - "For related-party (a) and high-value (k) exceptions, confirm the buyer has given the waiver notice BEFORE signing."
  - "For rates-recovery (c) and long-term-tenant (d) exceptions, confirm the seller has given the prescribed notice."
  - "If the exception is uncertain, treat disclosure as required and refer to OFT or a solicitor."

agent_wording:
  safe_version: null
  avoid_saying: []

exceptions:
  - "This rule itself states the exceptions to s 99; whether a given sale falls within one must be confirmed for the specific facts."

penalty: null

human_escalation_required: true
escalation_reason:
  - seller disclosure defect
  - contract termination consequence

