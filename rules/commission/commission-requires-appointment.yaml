id: RULE-COMM-001
title: No entitlement to commission without a valid written appointment
jurisdiction: QLD
module: commission
question_types:
  - rule_check
  - risk_assessment

status: active
verification_status: verified
verification_note: null
risk_level: high
authority_tier: legislation

applies_when:
  - An agent wants to know whether they can claim commission on a sale.
  - Reviewing whether commission is recoverable.

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.

requirement: >-
  A person is not entitled to recover a reward or expense unless they were
  properly appointed under the Act. In practical agency terms the reward is
  usually the commission the agent is seeking to recover, so acting without a
  valid Form 6 appointment puts that recovery at risk.

detail: >-
  Section 89 ("Restriction on recovery of reward or expense—no proper
  authorisation etc.") provides that a person is not entitled to sue for, recover
  or keep a reward or expense unless they were properly appointed under part 4
  (which includes the appointment under s 102). The Act's term is "reward or
  expense"; in practice the reward is commonly the commission the agent is
  seeking. The consequence is treated as high risk and escalated.

sources:
  - source_id: SRC-POA-2014
    pinpoint: "s 89 \"Restriction on recovery of reward or expense—no proper authorisation etc.\"; s 102 (appointment)"
    source_role: primary
    url: "https://www.legislation.qld.gov.au/view/html/inforce/current/act-2014-022"
    quote: "not entitled to sue for, recover or keep a reward or expense"

agent_action:
  - "Confirm a valid Form 6 appointment is in place before doing any work for which you expect a reward or expense."
  - "If a sale has happened on a defective or missing appointment, get advice before claiming any reward or expense."

agent_wording:
  safe_version: null
  avoid_saying: []

exceptions: []
penalty: null

human_escalation_required: true
escalation_reason:
  - possible commission recovery issue

related_rules:
