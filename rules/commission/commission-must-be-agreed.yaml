id: RULE-COMM-002
title: Commission must be agreed and stated in the appointment
jurisdiction: QLD
module: commission
question_types:
  - rule_check
  - checklist

status: active
verification_status: verified
verification_note: null
risk_level: medium
authority_tier: legislation

applies_when:
  - Setting or reviewing the commission on a sale appointment.

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.

requirement: >-
  The appointment must state the fees, charges and any commission for the service,
  when they become payable, the authorised expenses, and any rebate, discount or
  benefit the agent may receive (Property Occupations Act 2014 s 104). If
  commission is a percentage, it must be worked out on the actual sale price
  (s 105).

detail: >-
  Commission for residential sales in Queensland is not capped by statute, so it
  is what is agreed and stated in the appointment. Section 104 sets out what the
  appointment must state about fees, charges, commission, timing, expenses and any
  rebate or benefit; section 105 requires a percentage commission to be calculated
  on the actual sale price, not an estimate. The Form 6 records these in Part 7
  (commission) and Part 8 (fees, charges, expenses, rebates and benefits).

sources:
  - source_id: SRC-POA-2014
    pinpoint: "s 104 \"General content of appointment\"; s 105 (percentage commission worked out on the actual sale price)"
    source_role: primary
    url: "https://www.legislation.qld.gov.au/view/html/inforce/current/act-2014-022"
    quote: "the fees, charges and any commission payable for the service"
  - source_id: SRC-FORM-6
    pinpoint: "Form 6 Part 7 (Commission); Part 8 (fees, charges, expenses, rebates/discounts/benefits)"
    source_role: supporting
    url: "https://www.publications.qld.gov.au/dataset/oft-property-transaction-forms/resource/c795afc7-6a5a-473e-a6e0-855bea83aa5b"
    quote: "the commission including GST payable for the service"

agent_action:
  - "State the commission, fees, charges, when they are payable, and authorised expenses in the Form 6 before acting (s 104)."
  - "If commission is a percentage, make sure the form works it out on the actual sale price, not an estimate (s 105)."

