id: RULE-OFFERS-001
title: Handling multiple offers without misleading buyers
jurisdiction: QLD
module: offers-and-negotiation
question_types:
  - rule_check
  - agent_script
  - risk_assessment

status: active
verification_status: partially_verified
verification_note: >-
  Verified: agents must not make false, misleading or deceptive statements about
  offers (POA s 212; ACL s 18 and s 30). NOT a statutory rule: there is no
  positive duty to disclose the existence or terms of other offers. No official
  source was found creating such a duty; this absence of obligation is not itself
  a statutory permission. Rule kept partially_verified for that reason.
risk_level: high
authority_tier: legislation

applies_when:
  - An agent is handling more than one offer on a property.
  - An agent asks what they can tell a buyer about other offers.

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.

requirement: >-
  You must not make false, misleading or deceptive statements about offers. Do not
  invent or overstate competing offers. If you choose to discuss other offers, what
  you say must be true and authorised. No official source was found creating a
  general positive duty to disclose the existence or terms of other offers.

detail: >-
  The binding constraint is the prohibition on false or misleading conduct (POA
  s 212; ACL s 18, and s 30 for representations about land). Telling a buyer there
  is a higher offer that does not exist, or that they must "beat" a figure that is
  not real or authorised, risks breaching it. Choosing not to disclose competing
  offers is different from actively misleading; the absence of a disclosure duty is
  not a statutory permission.

sources:
  - source_id: SRC-ACL
    pinpoint: "s 18 \"Misleading or deceptive conduct\"; s 30 \"False or misleading representations about sale etc. of land\""
    source_role: primary
    url: "https://www.legislation.gov.au/C2004A00109/latest/text"
    quote: "must not, in trade or commerce, engage in conduct that is misleading or deceptive or is likely to mislead or deceive"
  - source_id: SRC-POA-2014
    pinpoint: "s 212 \"False representations about property\""
    source_role: primary
    url: "https://www.legislation.qld.gov.au/view/html/inforce/current/act-2014-022"
    quote: "false or misleading relating to the letting, exchange or sale of real property"
  - source_id: SRC-ACCC-RE
    pinpoint: "must not mislead to encourage higher offers"
    source_role: supporting
    url: "https://www.accc.gov.au/business/advertising-and-promotions/false-or-misleading-claims"
    quote: null

agent_action:
  - "Only tell a buyer what is true and what the vendor has authorised you to say."
  - "If asked about other offers, you can decline to disclose their terms; do not fabricate or inflate them."

agent_wording:
  safe_version: "There are other interested parties, but I can't disclose the terms of their offers. I'd encourage you to put forward your best offer."
  avoid_saying:
    - "'We already have an offer over $900k' unless that is true and you are authorised to say it."
    - "'You'll need to beat $900k' if that figure is not accurate or not authorised."

exceptions: []
penalty: null

human_escalation_required: false
escalation_reason: []

related_rules:
  - RULE-MKTG-001

last_source_check: 2026-06-20
next_review_due: 2026-09-18
tags:
  - offers
  - negotiation
  - misleading-conduct
