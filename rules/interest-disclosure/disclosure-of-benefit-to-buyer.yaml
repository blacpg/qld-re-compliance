agent_action:
  - "Where you refer a buyer to a broker, conveyancer, inspector or similar for a service associated with the sale, disclose any relationship, any benefit you derive or expect and its amount or value, and the referred entity's name."
  - "Make the disclosure on the approved Form 8 and have the buyer acknowledge it in writing on the Form 8, both BEFORE the contract of sale is entered into."
  - "Treat 'benefit' broadly - it covers monetary or other benefits (s 157(4))."
  - "Before relying on the specific section numbers, confirm them on legislation.qld.gov.au."

agent_wording:
  safe_version: "I refer some buyers to [referred entity name]; I have [a commercial/personal relationship with them] and [receive / expect to receive a benefit of $X]. Please review and sign this Form 8 before we proceed to contract."
  avoid_saying:
    - "Telling a buyer that a verbal mention of a referral fee is enough - the disclosure must be on the approved Form 8 and acknowledged in writing before the contract."
    - "you should be fine"

exceptions: []

penalty: "Maximum 200 penalty units (POA s 157(1)). No statutory recovery or disgorgement remedy for an undisclosed benefit."

