agent_action:
  - "Do not buy, or have an associate buy, a property you are appointed to sell unless every limb of POA s 155(4) is met before the contract is entered into."
  - "Before the contract is entered into, obtain the client's written acknowledgement and consent on the approved Form 7, act fairly and honestly, and ensure the client is in substantially as good a position as a fair-market-value sale."
  - "Never take an option over your own listing in which you have a beneficial interest: s 154 has no defence."
  - "Treat employed salespeople buying a listing the same way: the offence extends to them (s 155(3))."
  - "Before relying on the specific section numbers, confirm them on legislation.qld.gov.au."

agent_wording:
  safe_version: null
  avoid_saying:
    - "Telling the client you can buy the listing yourself as long as you 'just disclose it' verbally - the s 155(4) acknowledgement must be in the approved form and the fair-value and fair-and-honest limbs must also be met."
    - "Suggesting an option over your own listing is fine if disclosed - s 154 has no defence."
    - "you should be fine"

exceptions:
  - "It is not an offence under s 155 only where ALL of s 155(4) is met before the contract: client's written acknowledgement and consent in the approved form, the agent acts fairly and honestly, and the client is in substantially as good a position as a fair-market-value sale."
  - "There is NO equivalent exception for the option offence in s 154."

penalty: "Maximum 200 penalty units or 3 years imprisonment (POA s 155(2)). On conviction, the court may order return of a beneficial interest in the form of commission (s 156)."

