id: RULE-INT-001
title: Obtaining a beneficial interest in the client's property (Form 7)
jurisdiction: QLD
module: interest-disclosure
question_types:
  - rule_check
  - risk_assessment
  - checklist

status: active
verification_status: verified
verification_note: null
risk_level: high
authority_tier: legislation

applies_when:
  - An agent (or a salesperson the agent employs) wants to buy, or otherwise acquire an interest in, a property the agent is appointed to sell.
  - The agent or an associate is in any way concerned in obtaining a benefit from the property the agent is selling for the client.
  - An agent asks whether they can buy their own listing, or take an option over it.

does_not_apply_when:
  - The question relates to property management or a residential tenancy.
  - The question relates to another jurisdiction.

requirement: >-
  A property agent commits an offence if the agent obtains a beneficial interest
  in the property the agent is appointed to sell, and the same offence extends to
  a real estate salesperson the agent employs (Property Occupations Act 2014 (Qld)
  s 155(2)-(3); max 200 penalty units or 3 years imprisonment). It is NOT an
  offence only if, before the contract is entered into, the agent obtains the
  client's written acknowledgement in the approved form (the Form 7) that the
  client is aware the agent is interested in obtaining a beneficial interest and
  consents; AND the agent acts fairly and honestly in relation to the sale; AND
  the client is in substantially as good a position as if the property were sold
  at fair market value (s 155(4)). The position is stricter for options:
  obtaining from the client an option to purchase a property in which the agent
  has a beneficial interest is an offence with NO fair-value / acknowledgement
  defence, so the option route is effectively absolute (s 154).

detail: >-
  Under the Property Occupations Act 2014 (Qld), "obtain" is defined inclusively
  to cover "being in any way concerned in obtaining" (s 152), so an agent does not
  need to be the named buyer to be caught. Section 153 sets out what counts as a
  "beneficial interest": a licensee or real estate salesperson is taken to have a
  beneficial interest where, for example, the purchase is made for the agent or an
  associate, via an option, or through certain corporations or partnerships in
  which they participate (these are inclusive, non-exhaustive examples - do not
  treat the list as closed).

  Section 155 ("Beneficial interest - other than options") makes it an offence for
  the property agent to obtain a beneficial interest in the property (s 155(2),
  max 200 penalty units or 3 years imprisonment), and extends that offence to a
  real estate salesperson employed by the agent (s 155(3)). The exception in
  s 155(4) is cumulative: it is not an offence only where, before the contract is
  entered into, the agent obtains the client's written acknowledgement IN THE
  APPROVED FORM that the client is aware the agent is interested in obtaining a
  beneficial interest and consents, AND the agent acts fairly and honestly in
  relation to the sale, AND the client is in substantially as good a position as
  if the property were sold at fair market value. The approved-form written
  acknowledgement is the Form 7.

  Options are treated separately and more strictly. Section 154 ("Beneficial
  interest - options") makes it an offence for the agent to obtain from the client
  an option to purchase the property in which the agent has a beneficial interest,
  and the agent must not sell the property if the agent obtains a beneficial
  interest in an option. There is no fair-value / acknowledgement defence to the
  option offence, so unlike s 155 it is effectively absolute. On a conviction
  under s 155(2) or (3), where the beneficial interest is in the form of
  commission, the court may order the return of the interest (s 156).

