agent_action:
  - "Get a written notice from the seller stating the reserve price (or that no reserve is set) before the auction starts."
  - "Do not help the seller set the reserve unless you have first given them a comparative market analysis."
  - "Allow seller bidding only if the notified conditions of sale state the sale is subject to the seller's right to bid; disclose any seller / seller's-agent bid to the other bidders and never accept a seller bid above the reserve."

agent_wording:
  safe_version: "The seller's reserve must be given to me in writing before the auction, and any bid by or for the seller is only allowed if the conditions of sale say the sale is subject to the seller's right to bid."
  avoid_saying:
    - "Helping the seller pick a reserve price without first giving them a comparative market analysis."
    - "Taking a seller or seller's-agent bid without disclosing it, or accepting one above the reserve."

exceptions: []

penalty: "Auctioneer helping set the reserve without first giving a CMA: max 540 penalty units (POA s 213(4)). Sale in contravention of the seller's-right-to-bid disclosure is voidable by the buyer before settlement (POA s 229A(3))."

