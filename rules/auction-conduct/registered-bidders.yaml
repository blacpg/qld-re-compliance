agent_action:
  - "Register each bidder before the auction: take their name and address and sight satisfactory evidence of identity."
  - "Assign each registered bidder a unique identifier, record name, address and identifier in the register, and tell people that only registered bidders' bids will be accepted."
  - "Keep the bidder register for at least 5 years and do not disclose a bidder's identity except to an inspector or a court."

agent_wording:
  safe_version: "Only registered bidders can bid, so I'll need your name, address and ID to register you before the auction."
  avoid_saying:
    - "Accepting bids from people who have not registered."
    - "Disclosing a registered bidder's identity outside the permitted exceptions."

exceptions:
  - "Limited exception: the auctioneer may disclose a registered bidder's identity to the seller or seller's agent to negotiate after the property is passed in (PO Reg 2014 s 25)."

